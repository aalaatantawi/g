name: OBGYNX Production Deploy

on:
  push:
    branches:
      - main  # اتأكدي إن اسم الفرع عندك main مش master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. تحميل الكود من جيتهاب للمحرك بتاعنا
      - name: Checkout Code
        uses: actions/checkout@v3

      # 2. تجهيز Node.js (المحرك اللي هيعمل الـ Build)
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      # 3. تسطيب المكتبات وعمل النسخة الجاهزة (Build)
      - name: Install and Build
        run: |
          npm install
          npm run build
        env:
          VITE_GEMINI_API_KEY: ${{ secrets.VITE_GEMINI_API_KEY }}

      # 4. خطوة الـ Deploy (بعت الملفات لهوستنجر)
      - name: Copy Files to Hostinger
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT }}
          source: "dist/*"  # هنا بنقوله ابعت اللي جوه فولدر dist بس
          target: "domains/ai.obgynx.com/public_html"
          strip_components: 1 # دي أهم حتة عشان يرمي الملفات جوه public_html مباشرة
