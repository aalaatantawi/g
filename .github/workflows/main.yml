name: OBGYNX Production Deploy

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. سحب الكود من جيتهاب
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. تجهيز المحرك (Node.js 20) - ده اللي هيحل مشكلة الـ CustomEvent
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 3. تسطيب المكتبات وعمل النسخة الجاهزة (Build)
      - name: Install and Build
        run: |
          npm install --force
          npm run build
        env:
          VITE_GEMINI_API_KEY: ${{ secrets.VITE_GEMINI_API_KEY }}

      # 4. نقل الملفات النهائية لهوستنجر (Deploy)
      - name: Copy Files to Hostinger
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT }}
          source: "dist/*"
          target: "domains/ai.obgynx.com/public_html"
          strip_components: 1
